# ============================================================================
# smart-home-voice-lock 配置文件
# ----------------------------------------------------------------------------
# 说明：
# 1. `sim` 模式适合本地开发，不依赖真实设备。
# 2. `live` 模式需要先完成 Hue Bridge 配对，并填写 `hue.bridge.ip` 和
#    `hue.bridge.username`。
# 3. 本文件包含项目运行时的全部核心参数：录音、ASR、声纹、权限、设备、Hue。
# ============================================================================

# ----------------------------------------------------------------------------
# 录音参数
# ----------------------------------------------------------------------------
audio:
  # 固定采样率。当前项目的录音、Whisper 和声纹模块都以 16 kHz 为基准。
  sample_rate: 16000

  # 固定声道数。当前只支持单声道。
  channels: 1

  # 默认录音时长，单位秒。用户未显式指定时使用该值。
  default_duration: 3.0

  # 录音质量检查的最小时长，单位秒。
  min_duration: 0.3

  # 录音 RMS 音量阈值（仅用于质量警告，不用于 VAD）。
  low_volume_threshold: 0.02

  # 音量条刷新块时长，单位秒。值越小，终端音量条更新越频繁。
  block_duration: 0.1

  # 终端 ASCII 音量条宽度。
  volume_bar_width: 24

  # VAD: Silero 语音活动检测（sherpa-onnx 内置）
  vad_enabled: true
  vad_model_path: data/silero_vad.onnx
  vad_threshold: 0.5              # 语音概率阈值 (0.0-1.0)
  vad_silence_duration: 0.5       # 语音后静音多久判结束（秒）
  vad_min_speech_duration: 0.25   # 最短语音段（秒，更短视为噪声）
  vad_max_speech_duration: 20.0   # 最长语音段（秒，超过强制切分）

# ----------------------------------------------------------------------------
# 自动语音识别（ASR）
# ----------------------------------------------------------------------------
asr:
  # ASR 引擎: "sensevoice" (本地快，推荐) 或 "local" (Whisper 离线)
  provider: sensevoice

  # SenseVoice 配置 (sherpa-onnx)
  sensevoice_model_dir: data/sensevoice-small-int8
  sensevoice_num_threads: 4
  fallback_to_local: true

  # Whisper 配置 (回退用)
  model_size: base
  language: zh

# ----------------------------------------------------------------------------
# 声纹编码模型
# ----------------------------------------------------------------------------
speaker:
  # SpeechBrain 预训练说话人编码模型。
  model_source: speechbrain/spkrec-ecapa-voxceleb

  # 声纹模型输入采样率。
  sample_rate: 16000

  # ECAPA-TDNN 输出 embedding 维度。
  embedding_dim: 192

  # 模型缓存目录。
  cache_dir: .cache/speechbrain/spkrec-ecapa-voxceleb

  # 运行设备。常用值：cpu / cuda。
  device: cpu

# ----------------------------------------------------------------------------
# 声纹验证
# ----------------------------------------------------------------------------
verification:
  # 余弦相似度阈值。越高越严格。
  threshold: 0.70

# ----------------------------------------------------------------------------
# 用户注册
# ----------------------------------------------------------------------------
enrollment:
  # 注册时需要录制的语音样本数。
  num_samples: 3

  # 最大录音尝试次数。若质量不达标会重试，超过次数则失败。
  max_attempts: 5

  # 未指定角色时的默认角色。
  default_role: resident

  # 未指定权限时的默认权限列表。
  default_permissions: []

# ----------------------------------------------------------------------------
# 用户存储
# ----------------------------------------------------------------------------
auth:
  # 用户 JSON 数据文件路径。
  user_store_path: data/users.json

# ----------------------------------------------------------------------------
# 设备管理
# ----------------------------------------------------------------------------
devices:
  # 设备模式：
  # - sim: 使用内存模拟设备
  # - live: 使用 Hue Bridge 控制真实设备
  mode: live

  # `sim` 模式下的模拟设备清单。
  sim_devices:
    - device_id: bedroom_light
      name: 卧室灯
      device_type: light
      required_role: guest
      is_available: true
      initial_state:
        # 灯开关状态
        is_on: false
        # 亮度百分比 0-100
        brightness: 100
        # 色温档位：warm / neutral / cool
        color_temp: neutral
        # 颜色名称
        color: white

    - device_id: living_room_light
      name: 客厅灯
      device_type: light
      required_role: guest
      is_available: true
      initial_state:
        is_on: false
        brightness: 100
        color_temp: neutral
        color: white

    - device_id: study_light
      name: 书房灯
      device_type: light
      required_role: guest
      is_available: true
      initial_state:
        is_on: false
        brightness: 100
        color_temp: neutral
        color: white

    - device_id: living_room_group
      name: 客厅所有灯
      device_type: light
      required_role: guest
      is_available: true
      initial_state:
        is_on: false
        brightness: 100
        color_temp: neutral
        color: white

    - device_id: front_door_lock
      name: 入户门锁
      device_type: door_lock
      required_role: admin
      is_available: true
      initial_state:
        # true 表示默认上锁
        is_locked: true

    - device_id: home_thermostat
      name: 客厅空调
      device_type: thermostat
      required_role: member
      is_available: true
      initial_state:
        is_on: false
        # 温度范围由设备实现限制在 16-30 度
        temperature: 24

# ----------------------------------------------------------------------------
# Philips Hue 配置
# ----------------------------------------------------------------------------
hue:
  bridge:
    # Hue Bridge IP。优先从 env HUE_BRIDGE_IP 读取。
    # setup_hue.py 会自动写入这里，但建议用 env 避免提交 git。
    ip: ""

    # Hue API username。优先从 env HUE_BRIDGE_USERNAME 读取。
    # 按下 Bridge 按钮配对后获取。不要提交真实值到 git。
    username: ""

    # 是否校验 Bridge HTTPS 证书。局域网自签证书场景通常为 false。
    verify_ssl: false

    # 请求超时时间，单位秒。
    timeout_seconds: 5.0

    # 是否自动发现 Bridge。
    auto_discover: true

    # 当 HTTPS 探测失败时，是否允许自动回退到 HTTP。
    allow_http_fallback: true

    # Hue 官方 Bridge 发现地址。
    discovery_url: https://discovery.meethue.com/

  request_limits:
    # Hue 灯具资源请求速率上限，单位：请求/秒。
    lights_per_second: 10

    # Hue 灯组资源请求速率上限，单位：请求/秒。
    groups_per_second: 1

    # 其他通用请求速率上限，单位：请求/秒。
    default_per_second: 10

  # 激活场景时默认使用的 group id。留空时优先使用场景自带 group。
  default_scene_group: ""

  # 支持颜色控制的设备（Extended color light）。
  color_capable:
    - desk_lightstrip
    - desk_play_1
    - desk_play_2
    - desk_lights

  # 灯具别名映射。
  # 左侧是项目内部 canonical device_id，右侧是语音可说出的别名列表。
  light_aliases:
    desk_lightstrip:
      - Hue lightstrip plus
      - 灯带
      - 桌面灯带
    bedroom_lamp_1:
      - Hue white Lamp 1
      - 大灯
      - 房间灯
      - 卧室灯
    bedroom_lamp_2:
      - Hue white Lamp 2
      - 大灯2
    desk_play_1:
      - Hue Play 1
      - 桌灯1
      - play灯1
    desk_play_2:
      - Hue Play 2
      - 桌灯2
      - play灯2

  # 灯组别名映射。
  group_aliases:
    all_lights:
      - 5 AM.
      - 所有灯
      - 全部灯
    desk_lights:
      - Gaming desk
      - 桌灯
      - 办公桌灯
      - 桌面灯
      - 客厅全部灯
      - 客厅所有的灯

  # 场景别名映射。
  # 左侧是场景 canonical 名称，右侧是语音可识别的别名。
  scene_aliases:
    阅读模式:
      - 阅读模式
      - 阅读场景

  # 快捷语音短语。
  # 当前会被 parser 识别为 voice_shortcut 事件，是否执行联动由业务层决定。
  voice_shortcuts:
    晚安:
      - 晚安
    我回来了:
      - 我回来了

# ----------------------------------------------------------------------------
# 本地模型路由（F1）
# ----------------------------------------------------------------------------
models:
  groq:
    api_key: ""  # env GROQ_API_KEY
    model: llama-3.3-70b-versatile
  deepseek:
    api_key: ""  # env DEEPSEEK_API_KEY
    model: deepseek-chat
  local:
    provider: ollama
    model: qwen2.5:7b
    base_url: http://localhost:11434
    timeout: 30
  routing:
    confidence_threshold: 0.7

# ----------------------------------------------------------------------------
# 小月 AI 助手（LLM 大脑）
# ----------------------------------------------------------------------------
llm:
  # LLM 提供商：openai（兼容 Kimi/DeepSeek）或 anthropic。
  provider: openai

  # 运行时可切换的模型预设（"小月，快速模式" / "小月，深度模式"）
  default_preset: fast

  presets:
    fast:
      model: llama-3.3-70b-versatile
      base_url: "https://api.groq.com/openai/v1"
      api_key_env: GROQ_API_KEY
      max_tokens: 1024
    deep:
      model: grok-4.20-0309-non-reasoning
      base_url: "https://api.x.ai/v1"
      api_key_env: XAI_API_KEY
      max_tokens: 1024

  # 后备配置（无 presets 时使用）
  # 模型 ID。gpt-4o-mini / grok-4.20-0309-non-reasoning / grok-4.1-fast-non-reasoning。
  model: grok-4.20-0309-non-reasoning

  # OpenAI 兼容 base_url。留空 = OpenAI 官方。xAI: https://api.x.ai/v1
  base_url: "https://api.x.ai/v1"

  # 单次回复最大 token 数。
  max_tokens: 1024

  # API key。留空则从环境变量读取（OPENAI_API_KEY 或 ANTHROPIC_API_KEY）。
  # Kimi: env MOONSHOT_API_KEY 或填在此处。
  api_key: ""

# ----------------------------------------------------------------------------
# TTS 语音合成
# ----------------------------------------------------------------------------
tts:
  # 首选引擎：openai_tts（最自然）/ minimax / azure / edge-tts / pyttsx3。
  engine: minimax

  # 全局语速 0.25-4.0（1.0=正常，1.2=稍快，0.8=稍慢）
  speed: 1.0

  # OpenAI TTS（gpt-4o-mini-tts，ChatGPT 同款，最像真人）
  openai_tts_key: ""     # env OPENAI_API_KEY
  openai_tts_model: gpt-4o-mini-tts
  openai_tts_voice: nova  # nova(女声温暖活泼) echo(男声沉稳) shimmer(女声柔和) ballad(感性) verse(多变)
  openai_tts_instructions: "你叫小月，是一个中文私人管家。说话像跟认识很久的朋友聊天——自然、有温度、有个性。语气随内容变化，该轻快就轻快，该认真就认真。不要播音腔，不要客服腔。"

  # MiniMax TTS（TTS Arena 第一，中文最自然，带情感）
  minimax_key: ""        # env MINIMAX_API_KEY
  minimax_model: speech-02-turbo
  minimax_voice: "Chinese (Mandarin)_ExplorativeGirl"

  # Azure Neural TTS（备用，50万字/月免费）
  azure_key: ""          # env AZURE_SPEECH_KEY
  azure_region: canadacentral
  azure_voice: zh-CN-XiaoxiaoNeural

  # Edge TTS（免费备用）
  edge_voice: zh-CN-YunxiNeural
  edge_rate: "+0%"

  # 失败时回退到下一级引擎。
  fallback_enabled: true

# ----------------------------------------------------------------------------
# 唤醒词检测
# ----------------------------------------------------------------------------
wake_word:
  # 是否启用唤醒词。false 则使用按键触发。
  enabled: true

  # 唤醒词关键字。openwakeword 内置支持 "hey_jarvis"。
  # TODO: 训练自定义唤醒词 "小月"
  keyword: jarvis

  # 检测灵敏度 0.0-1.0。越高越容易触发，也越容易误触。
  sensitivity: 0.65

# ----------------------------------------------------------------------------
# 会话管理
# ----------------------------------------------------------------------------
session:
  # 静默超时（秒）。超过此时间无语音输入则结束会话。
  silence_timeout: 30

  # 单次录音时长（秒）。
  utterance_duration: 5

  # 结束会话的关键词。
  farewell_phrases:
    - 再见
    - 退出
    - bye
    - goodbye
    - that's all

# ----------------------------------------------------------------------------
# 记忆与对话历史
# ----------------------------------------------------------------------------
memory:
  # 保留最近 N 轮对话（每轮 = 一问一答）。
  max_conversation_turns: 20

  # 记忆提取专用 LLM（不填则跟主 llm 一样）。
  # 建议固定用 GPT-4o-mini — 支持 function calling，便宜稳定。
  llm:
    model: gpt-4o-mini
    base_url: ""  # 空 = OpenAI 官方

  # 对话历史持久化目录。
  conversation_dir: data/conversations

  # 用户偏好持久化目录。
  preferences_dir: data/memory

  # v2: Observer 记忆抽取配置
  observer:
    primary_model: "grok-4.20-0309-non-reasoning"
    fallback_model: "gemini-2.5-flash"
    enabled: true
  stable_prefix:
    max_tokens: 25000

# ----------------------------------------------------------------------------
# 技能配置
# ----------------------------------------------------------------------------
skills:
  weather:
    # 默认查询城市。
    default_city: Victoria

  reminders:
    # 提醒数据文件路径。
    path: data/reminders.json

  todos:
    # 待办数据目录。
    dir: data/todos

  realtime_data:
    enabled: false
    mock_mode: false
    cache:
      dir: data/realtime_data
      news_ttl_seconds: 1800
      stocks_ttl_seconds: 600
    news:
      provider: gnews
      api_key: ""  # env GNEWS_API_KEY
      language: zh  # en 或 zh
      country: cn   # us 或 cn
      topics:
        - world
        - ai
        - technology
        - business
      limit: 10
    stocks:
      provider: yahoo
      watchlist:
        - AAPL
        - NVDA
        - MSFT
        - GOOGL
    scheduler:
      enabled: true
      refresh_news_cron: "*/30 * * * *"    # 每30分钟刷新新闻
      refresh_stocks_cron: "*/15 * * * *"  # 每15分钟刷新股票

# ----------------------------------------------------------------------------
# OLED 显示
# ----------------------------------------------------------------------------
oled:
  enabled: false
  width: 128
  height: 64
  i2c_address: 0x3C
  emulator: true  # Mac 开发时用模拟器
  fps: 10

# ----------------------------------------------------------------------------
# MQTT 设备
# ----------------------------------------------------------------------------
mqtt:
  enabled: false
  broker_host: localhost
  broker_port: 1883
  username: jarvis
  password: ""
  devices: []

# ----------------------------------------------------------------------------
# 远程电脑控制
# ----------------------------------------------------------------------------
remote:
  enabled: false
  agent_host: ""
  agent_port: 8765
  token: ""

# ----------------------------------------------------------------------------
# 定时调度器
# ----------------------------------------------------------------------------
scheduler:
  enabled: true
  db_path: data/scheduler.db
  morning_briefing:
    enabled: false        # 改为 true 启用每日晨报
    cron: "0 8 * * *"    # 每天早 8 点
    include:
      - weather
      - reminders
      - todos
      - realtime_data     # 加入新闻+股票

# ----------------------------------------------------------------------------
# 场景自动化
# ----------------------------------------------------------------------------
automations:
  晚安:
    - {type: device, device_id: bedroom_light, action: turn_off}
    - {type: device, device_id: living_room_light, action: turn_off}
    - {type: speak, text: "晚安，好梦"}
  我回来了:
    - {type: device, device_id: living_room_light, action: turn_on}
    - {type: speak, text: "欢迎回家"}
  出门:
    - {type: device, device_id: living_room_light, action: turn_off}
    - {type: device, device_id: bedroom_light, action: turn_off}
    - {type: speak, text: "一路顺风"}

# ----------------------------------------------------------------------------
# 系统健康监控 (F8)
# ----------------------------------------------------------------------------
health:
  enabled: true

  circuit_breaker:
    # 连续失败几次标记为 DEGRADED（跳过该引擎）
    failure_threshold: 3
    # 连续失败几次标记为 UNAVAILABLE（只有探活成功才恢复）
    unavailable_threshold: 10
    # DEGRADED 后多久允许重试一次（秒）
    cooldown_seconds: 60

  proactive_checks:
    enabled: true
    # 探活间隔（秒）
    interval_seconds: 60

# ----------------------------------------------------------------------------
# 日志
# ----------------------------------------------------------------------------
logging:
  # 根日志级别。常见值：DEBUG / INFO / WARNING / ERROR。
  level: INFO

# ----------------------------------------------------------------------------
# 全双工打断检测
# ----------------------------------------------------------------------------
interrupt:
  enabled: true
  keywords: ["等一下", "停", "打住", "暂停", "等等", "你听我说",
             "不对", "你理解错了", "不是这样", "说错了"]
  resume_keywords: ["继续说", "接着说", "你继续", "继续"]
  streaming_asr:
    model_dir: data/sherpa-onnx-streaming-zipformer-small-bilingual-zh-en-2023-02-16
    num_threads: 2
  # 流式 ASR chunk 累积阈值（samples @ 16kHz）
  # 旧值 8000 = 500ms（打断响应慢），WP1 调到 3200 = 200ms
  streaming_asr_chunk_samples: 3200
  # Silero VAD 门控（TTS 播放期间过滤非语音帧）
  vad_model_path: data/silero_vad.onnx
  vad_threshold_during_tts: 0.8      # 高阈值，避免 AEC 残余误触发
  vad_min_speech_duration: 0.15      # 低，捕获"停"(~200ms)
  vad_min_silence_duration: 0.2
  vad_max_speech_duration: 10.0
