# ============================================================================
# smart-home-voice-lock 配置文件
# ----------------------------------------------------------------------------
# 说明：
# 1. `sim` 模式适合本地开发，不依赖真实设备。
# 2. `live` 模式需要先完成 Hue Bridge 配对，并填写 `hue.bridge.ip` 和
#    `hue.bridge.username`。
# 3. 本文件包含项目运行时的全部核心参数：录音、ASR、声纹、权限、设备、Hue。
# ============================================================================

# ----------------------------------------------------------------------------
# 录音参数
# ----------------------------------------------------------------------------
audio:
  # 固定采样率。当前项目的录音、Whisper 和声纹模块都以 16 kHz 为基准。
  sample_rate: 16000

  # 固定声道数。当前只支持单声道。
  channels: 1

  # 默认录音时长，单位秒。用户未显式指定时使用该值。
  default_duration: 3.0

  # 录音质量检查的最小时长，单位秒。
  min_duration: 0.25

  # 原始 ASR 录音存档：每个 voice turn 写一份 wav 到 dir/<session_id>/<ts>.wav，
  # 路径写入 trace.input_metadata.audio_path，用于后续重跑 ASR / 拿 n-best / 换模型对比。
  capture:
    enabled: true
    dir: data/audio

  # 录音 RMS 音量阈值（仅用于质量警告，不用于 VAD）。
  low_volume_threshold: 0.02

  # 音量条刷新块时长，单位秒。值越小，终端音量条更新越频繁。
  block_duration: 0.1

  # 终端 ASCII 音量条宽度。
  volume_bar_width: 24

  # VAD: Silero 语音活动检测
  vad_enabled: true
  vad_model_path: data/silero_vad.onnx
  # WP6: provider 选择 — silero_direct (onnxruntime 直调，帧级 prob+dB)
  # 或 sherpa_onnx (旧版封装 fallback)。切换不需重启硬件，仅 reload。
  vad_provider: silero_direct

  # silero_direct 专用参数（sherpa_onnx 时下面 4 个忽略，用 vad_threshold 等）
  vad_prob_threshold: 0.4         # 帧级 prob 触发阈值
  # 帧级 dBFS 门控（mic float32 范围 [-1,1]，dBFS 上限 0；静音 ~-100，
  # 普通说话 ~-26，大声 ~-10）。原 plan 写 60.0 是 SPL 思路，不可达。
  vad_db_threshold: -45.0
  vad_smoothing_window: 5         # 平滑窗口帧数
  vad_required_hits: 3            # 连续 N 帧 prob+dB 双过 → START
  vad_required_misses: 24         # 连续 N 帧低于阈值 → END

  # sherpa_onnx fallback 参数（vad_provider=sherpa_onnx 时使用）
  vad_threshold: 0.5              # 语音概率阈值 (0.0-1.0)
  vad_silence_duration: 0.5       # 语音后静音多久判结束（秒）
  vad_min_speech_duration: 0.25   # 最短语音段（秒，更短视为噪声）
  vad_max_speech_duration: 20.0   # 最长语音段（秒，超过强制切分）

# ----------------------------------------------------------------------------
# 自动语音识别（ASR）
# ----------------------------------------------------------------------------
asr:
  # ASR 引擎:
  #   sensevoice  - sherpa-onnx INT8, 短中文指令首选 (M2 Max RTF ~0.015)
  #   mlx_whisper - Apple Silicon 加速 Whisper, 中英混杂/技术词友好
  #   local       - openai-whisper (PyTorch), 慢, 仅作回退
  provider: mlx_whisper

  # SenseVoice 配置 (sherpa-onnx)
  sensevoice_model_dir: data/sensevoice-small-int8
  sensevoice_num_threads: 4
  fallback_to_local: true

  # MLX Whisper 配置 (provider=mlx_whisper)
  mlx_whisper_repo: mlx-community/whisper-large-v3-turbo
  mlx_whisper_fp16: true
  mlx_whisper_temperature: 0.0

  # openai-whisper 配置 (provider=local, 回退用)
  model_size: base
  language: zh

# ----------------------------------------------------------------------------
# 设备管理
# ----------------------------------------------------------------------------
devices:
  # 设备模式：
  # - sim: 使用内存模拟设备
  # - live: 使用 Hue Bridge 控制真实设备
  mode: live

  # `sim` 模式下的模拟设备清单。
  sim_devices:
    - device_id: bedroom_light
      name: 卧室灯
      device_type: light
      required_role: guest
      is_available: true
      initial_state:
        # 灯开关状态
        is_on: false
        # 亮度百分比 0-100
        brightness: 100
        # 色温档位：warm / neutral / cool
        color_temp: neutral
        # 颜色名称
        color: white

    - device_id: living_room_light
      name: 客厅灯
      device_type: light
      required_role: guest
      is_available: true
      initial_state:
        is_on: false
        brightness: 100
        color_temp: neutral
        color: white

    - device_id: study_light
      name: 书房灯
      device_type: light
      required_role: guest
      is_available: true
      initial_state:
        is_on: false
        brightness: 100
        color_temp: neutral
        color: white

    - device_id: living_room_group
      name: 客厅所有灯
      device_type: light
      required_role: guest
      is_available: true
      initial_state:
        is_on: false
        brightness: 100
        color_temp: neutral
        color: white

    - device_id: front_door_lock
      name: 入户门锁
      device_type: door_lock
      required_role: admin
      is_available: true
      initial_state:
        # true 表示默认上锁
        is_locked: true

    - device_id: home_thermostat
      name: 客厅空调
      device_type: thermostat
      required_role: member
      is_available: true
      initial_state:
        is_on: false
        # 温度范围由设备实现限制在 16-30 度
        temperature: 24

# ----------------------------------------------------------------------------
# Philips Hue 配置
# ----------------------------------------------------------------------------
hue:
  bridge:
    # Hue Bridge IP。优先从 env HUE_BRIDGE_IP 读取。
    # setup_hue.py 会自动写入这里，但建议用 env 避免提交 git。
    ip: ""

    # Hue API username。优先从 env HUE_BRIDGE_USERNAME 读取。
    # 按下 Bridge 按钮配对后获取。不要提交真实值到 git。
    username: ""

    # 是否校验 Bridge HTTPS 证书。局域网自签证书场景通常为 false。
    verify_ssl: false

    # 请求超时时间，单位秒。
    timeout_seconds: 5.0

    # 是否自动发现 Bridge。
    auto_discover: true

    # 当 HTTPS 探测失败时，是否允许自动回退到 HTTP。
    allow_http_fallback: true

    # Hue 官方 Bridge 发现地址。
    discovery_url: https://discovery.meethue.com/

  request_limits:
    # Hue 灯具资源请求速率上限，单位：请求/秒。
    lights_per_second: 10

    # Hue 灯组资源请求速率上限，单位：请求/秒。
    groups_per_second: 1

    # 其他通用请求速率上限，单位：请求/秒。
    default_per_second: 10

  # 激活场景时默认使用的 group id。留空时优先使用场景自带 group。
  default_scene_group: ""

  # 支持颜色控制的设备（Extended color light）。
  color_capable:
    - desk_lightstrip
    - desk_play_1
    - desk_play_2
    - desk_lights

  # 灯具别名映射。
  # 左侧是项目内部 canonical device_id，右侧是语音可说出的别名列表。
  light_aliases:
    desk_lightstrip:
      - Hue lightstrip plus
      - 灯带
      - 桌面灯带
    bedroom_lamp_1:
      - Hue white Lamp 1
      - 大灯
      - 房间灯
      - 卧室灯
    bedroom_lamp_2:
      - Hue white Lamp 2
      - 大灯2
    desk_play_1:
      - Hue Play 1
      - 桌灯1
      - play灯1
    desk_play_2:
      - Hue Play 2
      - 桌灯2
      - play灯2

  # 灯组别名映射。
  group_aliases:
    all_lights:
      - 5 AM.
      - 所有灯
      - 全部灯
    desk_lights:
      - Gaming desk
      - 桌灯
      - 办公桌灯
      - 桌面灯
      - 客厅全部灯
      - 客厅所有的灯

  # 场景别名映射。
  # 左侧是场景 canonical 名称，右侧是语音可识别的别名。
  scene_aliases:
    阅读模式:
      - 阅读模式
      - 阅读场景

  # 快捷语音短语。
  # 当前会被 parser 识别为 voice_shortcut 事件，是否执行联动由业务层决定。
  voice_shortcuts:
    晚安:
      - 晚安
    我回来了:
      - 我回来了

# ----------------------------------------------------------------------------
# 本地模型路由（F1）
# ----------------------------------------------------------------------------
# ----------------------------------------------------------------------------
# 小月 AI 助手（LLM 大脑）
# ----------------------------------------------------------------------------
llm:
  # LLM 提供商：openai（兼容 xAI/Kimi/DeepSeek）或 anthropic。
  provider: openai

  # 运行时可切换的模型预设（"小月，快速模式" / "小月，深度模式"）
  default_preset: fast

  presets:
    fast:
      model: gpt-5.4-mini
      base_url: "https://api.openai.com/v1"
      api_key_env: OPENAI_API_KEY
      max_tokens: 1024
    deep:
      model: gpt-5.5
      base_url: "https://api.openai.com/v1"
      api_key_env: OPENAI_API_KEY
      max_tokens: 1024

  # 流式回复的句子切分调优
  sentence_divider:
    # 首句遇逗号即切（更早 ship 给 TTS，首字延迟 -50%~)
    faster_first_response: true
    # 保护英文缩写不在 Dr./e.g./vs. 等处误切
    abbreviation_protect: true

# ----------------------------------------------------------------------------
# TTS 语音合成
# ----------------------------------------------------------------------------
tts:
  # 全局语速 0.25-4.0（1.0=正常，1.2=稍快，0.8=稍慢）
  speed: 1.0

  # MiniMax TTS — primary: 国际 .io WS 流式; fallback: 国内 .chat HTTP 一次性。
  # 两者使用不同账号 key，但 voice/model 必须一致以保证音色不变。
  minimax_base_url: "https://api-uw.minimax.io"
  minimax_key: ""                        # env MINIMAX_API_KEY (international account)
  minimax_fallback_base_url: "https://api.minimax.chat"
  minimax_fallback_key: ""               # env MINIMAX_FALLBACK_API_KEY (domestic account)
  minimax_model: speech-2.8-turbo
  minimax_voice: "Chinese (Mandarin)_ExplorativeGirl"
  minimax_volume: 1    # int 1-10, 1=正常；之前 5 偏大有爆音（float 会被 round+clamp，见 core/tts.py:127）
  minimax_ws: true      # WS streaming on primary (.io); fallback path is HTTP-only
  minimax_prewarm: true # open WS eagerly on LLM first token (overlaps handshake with LLM)
  browser_streaming: true  # prefer PCM-over-WS to browser when a WS is open;
                           # false = always serve /api/audio/<hash>.wav files

  # 持续流播放器(替代 afplay/mpv/ffplay subprocess)。
  # 保持单个 sd.OutputStream 跨会话打开,PCM 经 ring buffer 喂 callback,
  # 消除每句 subprocess spawn 的 ~30-150ms 开销,实现句间零 gap。
  # 软停走 gain ducking(~30ms ramp 到 30% 音量),sample-accurate
  # 且无 loop 尾巴 —— 根治 SIGSTOP + afplay 的 CoreAudio underrun artifact。
  stream_player:
    enabled: true              # false 则退回老 subprocess afplay 路径
    sample_rate: 48000         # Mac CoreAudio 原生率,不经 HAL 重采样
    ring_seconds: 2.0          # 环形缓冲大小(秒),控制最大预缓冲
    duck_volume: 0.3           # 软停时的音量倍率(30% = 能听到但不抢戏)
    duck_ramp_ms: 30.0         # duck 渐变时长(10-50ms 是 click-free 甜点)
    unduck_ramp_ms: 10.0       # unduck 渐变时长(快恢复,不需要那么平滑)

  # TTS 文本预处理：剥离 emoji / 括号 / 星号等不该朗读的内容
  # 每个开关独立可关；默认全开
  tts_preprocessor:
    remove_special_char: true     # emoji / 控制字符
    ignore_brackets: true         # [开心] [叹气]
    ignore_parentheses: true      # (旁白) （旁白）
    ignore_asterisks: true        # *强调* **粗体**
    ignore_angle_brackets: true   # <break/> <emotion>x</emotion>

# ----------------------------------------------------------------------------
# 唤醒词检测
# ----------------------------------------------------------------------------
wake_word:
  # 是否启用唤醒词。false 则使用按键触发。
  enabled: true

  # Web 后台启动时也为 InherentCard 开启后台唤醒监听。
  inherent_enabled: true

  # 唤醒词关键字。openwakeword 内置支持 "hey_jarvis"。
  # TODO: 训练自定义唤醒词 "小月"
  keyword: jarvis

  # 检测灵敏度 0.0-1.0。越高越容易触发，也越容易误触。
  sensitivity: 0.65

  # macOS 本地环境默认使用 onnx，避免依赖 tflite-runtime。
  inference_framework: onnx

  # openwakeword 内置 Silero VAD 前置门，0.0 = 关闭（默认）。
  # 仅当观测到 TV/音乐误唤醒时调高（建议 0.3-0.5）。
  # XVF3800 硬件已做 NS+AEC，保持 0.0；调高可能导致远场/轻声漏检。
  vad_threshold: 0.0

# ----------------------------------------------------------------------------
# 语音输入时系统音频压低
# ----------------------------------------------------------------------------
audio_ducking:
  # 语音录音期间把 macOS 系统输出设为 0 + 静音，录音结束后恢复原状态。
  enabled: true

# ----------------------------------------------------------------------------
# 会话管理
# ----------------------------------------------------------------------------
session:
  # 静默超时（秒）。超过此时间无语音输入则结束会话。
  silence_timeout: 30

  # 单次录音时长（秒）。
  utterance_duration: 5

# ----------------------------------------------------------------------------
# 记忆与对话历史
# ----------------------------------------------------------------------------
memory:
  # 保留最近 N 轮对话（每轮 = 一问一答）。
  max_conversation_turns: 20

  # 对话历史持久化目录。
  conversation_dir: data/conversations

  # v2: Observer 记忆抽取配置
  # 注意：primary 和 fallback 可以指向不同的 LLM 提供商。每个模型独立配置 endpoint +
  # api_key_env，避免把 Gemini 请求发到 xAI（bug 2026-04-17）。
  observer:
    primary_model: "grok-4.20-0309-non-reasoning"
    primary_base_url: "https://api.x.ai/v1"
    primary_api_key_env: XAI_API_KEY
    fallback_model: "gemini-2.5-flash"
    fallback_base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
    fallback_api_key_env: GEMINI_API_KEY
    enabled: true

  outcome_detector:
    nli:
      enabled: true
      model_dir: data/nli-erlangshen
      # Empirically calibrated: 0.7 misses mid-confidence positives like "你说得很对" (0.67).
      entailment_threshold: 0.65
      # 2 chars allows "好的" / "不对" (each 2 chars, common approval/correction).
      min_text_length: 2
      max_text_length: 500

# ----------------------------------------------------------------------------
# 技能配置
# ----------------------------------------------------------------------------
skills:
  weather:
    # 默认查询城市。
    default_city: Victoria

  reminders:
    # 提醒数据文件路径。
    path: data/reminders.json

  todos:
    # 待办数据目录。
    dir: data/todos

# ----------------------------------------------------------------------------
# OLED 显示
# ----------------------------------------------------------------------------
oled:
  enabled: false
  width: 128
  height: 64
  i2c_address: 0x3C
  emulator: true  # Mac 开发时用模拟器
  fps: 10

# ----------------------------------------------------------------------------
# MQTT 设备
# ----------------------------------------------------------------------------
mqtt:
  enabled: false
  broker_host: localhost
  broker_port: 1883
  username: jarvis
  password: ""
  devices: []

# ----------------------------------------------------------------------------
# 定时调度器
# ----------------------------------------------------------------------------
scheduler:
  enabled: true
  db_path: data/scheduler.db
  morning_briefing:
    enabled: false        # 改为 true 启用每日晨报
    cron: "0 8 * * *"    # 每天早 8 点
    include:
      - weather
      - reminders
      - todos

# ----------------------------------------------------------------------------
# 系统健康监控 (F8)
# ----------------------------------------------------------------------------
health:
  enabled: true

  circuit_breaker:
    # 连续失败几次标记为 DEGRADED（跳过该引擎）
    failure_threshold: 3
    # 连续失败几次标记为 UNAVAILABLE（只有探活成功才恢复）
    unavailable_threshold: 10
    # DEGRADED 后多久允许重试一次（秒）
    cooldown_seconds: 60

  proactive_checks:
    enabled: true
    # 探活间隔（秒）
    interval_seconds: 60

# ----------------------------------------------------------------------------
# 日志
# ----------------------------------------------------------------------------
logging:
  # 根日志级别。常见值：DEBUG / INFO / WARNING / ERROR。
  level: INFO

# ----------------------------------------------------------------------------
# 全双工打断检测
# ----------------------------------------------------------------------------
interrupt:
  enabled: true
  keywords: ["等一下", "停", "打住", "暂停", "等等", "你听我说",
             "不对", "你理解错了", "不是这样", "说错了"]
  resume_keywords: ["继续说", "接着说", "你继续", "继续"]
  # 打断识别走主 ASR 栈（SenseVoice + ASRNormalizer，和 audio.asr 同一个实例）。
  # VAD 段关门后对段内音频做一次离线解码。跳过太短的 VAD 段（噪声/咔哒声）。
  min_segment_ms: 150
  # Pre-roll / post-roll: 给 SenseVoice 留 VAD 触发前/后的音频上下文。
  # 没有 preroll，VAD required_hits 会把"停"的初始辅音 t 砍掉 → 识别成"嗯"；
  # +500ms pre / +200ms post 能稳定识别"停"这类单字（实测数据 run2）。
  preroll_ms: 500
  postroll_ms: 200
  # Silero VAD 门控（TTS 播放期间过滤非语音帧）
  vad_model_path: data/silero_vad.onnx
  # WP6: provider 选择（同 audio.vad_provider，但播放期间是独立实例）
  vad_provider: silero_direct

  # silero_direct 专用 — TTS 播放期间阈值（比录音模式更严，抗 AEC 残余）
  vad_prob_threshold_during_tts: 0.5
  # VAD 环境模式 —— 决定 TTS 期间 dBFS 阈值档位,代码自动应用。
  #   headphones: TTS 不反灌到 mic → 阈值可松(-40 Mac / -38 RPi),
  #               能接住正常距离说话。
  #   speakers:   TTS 从音响反灌到 mic → 阈值要严(-22 Mac / -32 RPi),
  #               挡 bleed,但要求用户贴麦或大声说才会触发。
  # 切换只改这一行。
  vad_mode: headphones
  # 可选直接覆盖(设了就忽略 vad_mode 档位),通常不需要:
  # vad_db_threshold_during_tts_mac: -40.0
  # vad_db_threshold_during_tts_rpi: -38.0
  vad_smoothing_window: 5
  vad_required_hits: 3
  vad_required_misses: 24

  # sherpa_onnx fallback 参数
  vad_threshold_during_tts: 0.8      # 高阈值，避免 AEC 残余误触发
  vad_min_speech_duration: 0.15      # 低，捕获"停"(~200ms)
  vad_min_silence_duration: 0.2
  vad_max_speech_duration: 10.0

  # WP7 软停（VAD 检测到说话 → TTS 降音量 + ASR 保留 3s 关键词窗口）
  # 2026-04-17: 开启。SIGSTOP+afplay 的 loop 尾巴问题已被 AudioStreamPlayer
  # 的 gain ducking 路径根治（live_stream_player_probe 验证 duck+unduck 干净、
  # 0 underflow/10k callbacks）。stream_player 未启用时仍退回 SIGSTOP 路径。
  soft_stop_enabled: true
  soft_stop_timeout_ms: 3000         # 无关键词命中 3s 后自动恢复播放
  soft_stop_method: suspend          # 字段保留；实际走 stream_player.duck() 优先

# ----------------------------------------------------------------------------
# ASR 文本归一化（WP2 三层）
# ----------------------------------------------------------------------------

# Layer 1：手动 override + require_context 守卫（防误改）
# 每条都必须带 require_context（一个或多个上下文词），命中时才替换
# Allen 翻 trace_log 找设备执行失败的 ASR 原文（user_text + input_metadata.asr_text_raw + path_taken），把高频误识别加进来
asr_corrections:
  - pattern: 客厅大蛋
    replace: 客厅大灯
    require_context: [开, 关, 调, 亮, 暗, 灯, 模式]
  - pattern: 放送模式
    replace: 放松模式
    require_context: [模式, 开, 启动, 切换]

# Layer 2：结构化别名 alias→canonical（无需 context，alias 已是明确语义）
# 格式：canonical_name: [alias1, alias2, ...]
# 与 hue.light_aliases 是不同抽象层（这里用于 ASR 文本归一化，不是设备 id 解析）
# 主要由 Allen 根据自己叫法填充；执行 agent 留 1-2 个示例占位
asr_aliases:
  # 示例（可删，让 Allen 自己填）
  客厅大灯: [客厅主灯, 客厅顶灯]
  放松模式: [休闲模式]

# Layer 3：Levenshtein 兜底，默认关闭（误判率高）
asr_normalizer_fuzzy:
  enabled: false
  max_distance: 2

# LLM/TTS pricing lives in data/pricing.json (refresh via scripts/refresh_pricing.py).

# ----------------------------------------------------------------------------
# Regex Router (L0 fast-path)
# ----------------------------------------------------------------------------
# Closed-trigger whitelist for single-step skills. See
# docs/superpowers/specs/2026-04-29-regex-router-cleanup-design.md
regex_router:
  # Canonical Chinese alias → device_id. Other aliases (e.g. 卧室灯, strip)
  # are intentionally NOT here and fall through to cloud LLM.
  device_alias:
    灯带: desk_lightstrip
    大灯: bedroom_group     # virtual group: bedroom_lamp_1 + bedroom_lamp_2 (see tools/smart_home.py VIRTUAL_GROUPS)
    电脑灯: desk_lights
    灯: all_lights

  # Scene index → canonical Hue scene name. "切到 N" / "激活 N" via regex.
  # Update both this map AND the regex range [1-N] in core/regex_router.py
  # if you add scenes. Canonical name is matched against the bridge via
  # HueSceneDevice fuzzy match (tier-2 exact name). Testing-phase indices.
  scene_alias:
    "1": "2023-12-23"
    "2": "Hoho"
    "3": "lol"
    "4": "Ocean"
    "5": "pink"
    "6": "study"
    "7": "赛博朋克"

  # TTS template pool. random.choice per turn. Variables: {tool_result}
  # plus per-pattern template_vars (e.g. {device}, {value}, {minutes}, {arg}).
  templates:
    farewell:
      - "再见。"
    get_current_time:
      - "现在{tool_result}。"
      - "{tool_result}。"
    get_date:
      - "今天{tool_result}。"
      - "{tool_result}。"
    set_timer:
      - "好，{minutes}分钟后提醒你。"
      - "行，{minutes}分钟。"
    weather:
      - "{tool_result}"
    list_todos:
      - "{tool_result}"
    add_todo:
      - "好，加进todo了。"
      - "记下了。"
    obsidian_inbox:
      - "好，进inbox了。"
      - "记下了。"
    cc_tell:
      - "发过去了。"
      - "说了。"
    type_to_focused:
      - "好，输入了。"
      - "打了。"
    smart_home_turn_on:
      - "好，{device}开了。"
      - "{device}亮了。"
      - "好的。"
    smart_home_turn_off:
      - "好，{device}关了。"
      - "{device}灭了。"
      - "好的。"
    smart_home_set_brightness:
      - "好，{device}{value}%了。"
      - "调好了，{value}%。"
    cc_interrupt:
      - "好，停了。"
      - "停了。"
    cc_slash_model:
      - "好，切到{arg}了。"
      - "{arg}了。"
    cc_slash_effort:
      - "好，effort {arg}了。"
      - "{arg}了。"
    scene_activate:
      - "好，{scene}场景。"
      - "切到{scene}了。"
