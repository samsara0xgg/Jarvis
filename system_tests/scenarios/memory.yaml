name: 记忆系统
description: 记忆的真实价值在于"让小月了解你"，不是机械存取

setup:
  user: {id: allen, name: Allen, role: owner}

scenarios:

  # ────────────────────────────────────────
  # 场景 1：延迟检索 — 存完聊几轮再问
  # 真实用户不会存完立刻问，中间有无关对话
  # ────────────────────────────────────────
  - name: 延迟检索
    review: true
    review_hint: "间隔几轮无关对话后，记忆是否还能被正确召回"
    steps:
      - user: "记住我每天早上七点起床"
        expect:
          path: memory_shortcut
          response_contains: ["记住"]

      - user: "今天天气怎么样"
        expect:
          route: info_query

      - user: "再给我讲个笑话"
        expect:
          tier: cloud

      - user: "我每天几点起床来着"
        expect:
          response_contains: ["七点"]

  # ────────────────────────────────────────
  # 场景 2：偏好更新覆盖
  # 用户改主意，记忆系统要 supersede 旧值
  # ────────────────────────────────────────
  - name: 偏好更新
    review: true
    review_hint: "存新值后旧值是否被覆盖，查询是否拿到最新的"
    steps:
      - user: "记住我喜欢喝美式咖啡"
        expect:
          path: memory_shortcut

      - user: "我喜欢喝什么"
        expect:
          response_contains: ["美式"]

      - user: "我现在改喝拿铁了，记一下"
        expect:
          path: memory_shortcut

      - user: "我现在爱喝什么"
        expect:
          response_contains: ["拿铁"]
          response_not_contains: ["美式"]

  # ────────────────────────────────────────
  # 场景 3：隐式偏好使用（记忆 + cloud 融合）
  # 预置偏好，看 cloud 回复会不会主动用到
  # ────────────────────────────────────────
  - name: 隐式偏好使用
    review: true
    review_hint: "预置了'喜欢咖啡'的偏好，cloud 推荐早餐时是否自然带出来"
    setup:
      memory:
        - content: "用户喜欢喝咖啡，早晨尤其喜欢美式"
          category: preference
          key: favorite_drink
          importance: 7
    steps:
      - user: "推荐一下我的早餐搭配"
        expect:
          tier: cloud

  # ────────────────────────────────────────
  # 场景 4：多维度身份
  # 不同 category 同时存在，查询各自拿对应的
  # ────────────────────────────────────────
  - name: 多维度身份
    review: true
    review_hint: "姓名（identity）、职业（identity）、偏好（preference）不应该串"
    steps:
      - user: "记住我叫Allen"
        expect:
          path: memory_shortcut

      - user: "记住我是软件工程师"
        expect:
          path: memory_shortcut

      - user: "记住我养了一只叫毛毛的猫"
        expect:
          path: memory_shortcut

      - user: "我叫什么"
        expect:
          response_contains: ["Allen"]

      - user: "我的工作是什么"
        expect:
          response_contains: ["程序", "工程", "软件"]

      - user: "我的猫叫什么"
        expect:
          response_contains: ["毛毛"]

  # ────────────────────────────────────────
  # 场景 5：记忆不污染
  # 普通问答、设备指令不应该存为记忆
  # ────────────────────────────────────────
  - name: 记忆不污染
    steps:
      - user: "现在几点了"
        expect:
          route: time
          memory_not_contains:
            content_matches: "几点"

      - user: "打开卧室灯"
        expect:
          route: smart_home
          memory_not_contains:
            content_matches: "卧室灯"

      - user: "1加1等于几"
        expect:
          tier: cloud
          memory_not_contains:
            content_matches: "1加1"

  # ────────────────────────────────────────
  # 场景 6：直答路径（memory_l1）
  # 明确偏好已知，简单查询不应该调 LLM
  # ────────────────────────────────────────
  - name: 直答路径
    setup:
      memory:
        - content: "用户的生日是5月20日"
          category: identity
          key: birthday
          importance: 8
    steps:
      - user: "我的生日是什么时候"
        expect:
          path: memory_l1
          response_contains: ["5月20", "五月二十"]
