name: 智能家居控制
description: Hue 灯光控制（匹配真实设备 ID）

setup:
  user: {id: allen, name: Allen, role: owner}

scenarios:
  - name: 单灯开关
    steps:
      - user: "打开卧室灯"
        expect:
          route: smart_home
          tier: local
          device_state:
            bedroom_lamp_1: {is_on: true}
      - user: "再关掉"
        expect:
          route: smart_home
          device_state:
            bedroom_lamp_1: {is_on: false}

  - name: 亮度调节
    steps:
      - user: "把卧室灯调到50%亮度"
        expect:
          route: smart_home
          device_state:
            bedroom_lamp_1: {is_on: true}

  - name: 色温调节
    steps:
      - user: "把卧室灯调成暖光"
        expect:
          route: smart_home

  - name: 灯带控制
    steps:
      - user: "打开灯带"
        expect:
          route: smart_home
          device_state:
            desk_lightstrip: {is_on: true}
      - user: "关掉灯带"
        expect:
          device_state:
            desk_lightstrip: {is_on: false}

  - name: 灯组控制
    steps:
      - user: "把所有灯都打开"
        expect:
          device_state:
            all_lights: {is_on: true}
      - user: "全部关掉"
        expect:
          device_state:
            all_lights: {is_on: false}

  - name: 桌灯控制
    steps:
      - user: "打开桌灯"
        expect:
          route: smart_home
          device_state:
            desk_lights: {is_on: true}

  - name: 自然语言控灯
    review: true
    steps:
      - user: "帮我把卧室弄暗一点"
        expect:
          route: smart_home
        review_hint: "是否正确理解为调暗卧室灯，回复是否说明了调整结果"
