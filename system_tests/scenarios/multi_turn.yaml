name: 多轮对话
description: 上下文代词解析、话题切换、长程引用 — "让小月记得你刚才说了什么"

setup:
  user: {id: allen, name: Allen, role: owner}

scenarios:

  # ────────────────────────────────────────
  # 场景 1：代词链（设备场景）
  # "再亮点/暗点/关了" 应该全都指向第一轮提到的灯
  # ────────────────────────────────────────
  - name: 设备代词链
    review: true
    review_hint: "后续每一句的代词是否都指向第一轮的卧室灯"
    steps:
      - user: "打开卧室灯，50%"
        expect:
          route: smart_home
          device_state:
            bedroom_lamp_1: {is_on: true}

      - user: "再亮一点"
        expect:
          device_state:
            bedroom_lamp_1: {is_on: true}

      - user: "太亮了 调暗"
        expect:
          device_state:
            bedroom_lamp_1: {is_on: true}

      - user: "算了关了吧"
        expect:
          device_state:
            bedroom_lamp_1: {is_on: false}

  # ────────────────────────────────────────
  # 场景 2：话题切换再回归
  # 开话题 A → 跳去 B → 回到 A
  # ────────────────────────────────────────
  - name: 话题切换回归
    review: true
    review_hint: "从笑话切到天气再回到笑话，是否理解'再讲一个'是笑话不是天气"
    steps:
      - user: "给我讲个笑话"
        expect:
          tier: cloud

      - user: "多伦多天气怎么样"
        expect:
          route: info_query

      - user: "再讲一个"
        expect:
          tier: cloud

  # ────────────────────────────────────────
  # 场景 3：长程引用（隔 5+ 轮）
  # 开头提一个事 → 聊别的 → 回问
  # ────────────────────────────────────────
  - name: 长程引用
    review: true
    review_hint: "隔了 5 轮之后，是否还能正确回忆起第一轮提到的猫咪名字"
    steps:
      - user: "我昨天新领养了一只猫，叫小白"
        expect:
          tier: cloud

      - user: "现在几点"
        expect:
          route: time

      - user: "打开卧室灯"
        expect:
          route: smart_home

      - user: "多伦多天气怎么样"
        expect:
          route: info_query

      - user: "给我讲个笑话"
        expect:
          tier: cloud

      - user: "刚才我说的猫叫什么"
        expect:
          tier: cloud

  # ────────────────────────────────────────
  # 场景 4：消歧反问
  # 模糊指令 → 小月应该主动追问
  # ────────────────────────────────────────
  - name: 消歧反问
    review: true
    review_hint: "面对模糊指令，小月是否主动反问澄清，而不是猜一个执行"
    steps:
      - user: "把灯调一下"
        expect:
          tier: cloud

      - user: "桌灯1，调成暖光"
        expect:
          route: smart_home
          device_state:
            desk_play_1: {is_on: true}

  # ────────────────────────────────────────
  # 场景 5：中断与继续
  # 说到一半换话题，再接回来
  # ────────────────────────────────────────
  - name: 中断与继续
    review: true
    review_hint: "话说一半插入无关话题，再说'继续刚才的'是否回得上"
    steps:
      - user: "我想跟你说说我最近的工作"
        expect:
          tier: cloud

      - user: "等一下 先告诉我现在几点"
        expect:
          route: time

      - user: "好 继续刚才的话题吧"
        expect:
          tier: cloud
