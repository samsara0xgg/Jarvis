<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小月</title>
    <link rel="stylesheet" href="css/test_page.css?v=0403">
    <script>
        if (window.location.protocol === 'file:') {
            document.addEventListener('DOMContentLoaded', function () {
                const overlayDiv = document.createElement('div');
                overlayDiv.className = 'file-protocol-overlay';
                document.body.appendChild(overlayDiv);
                const warningDiv = document.createElement('div');
                warningDiv.id = 'fileProtocolWarning';
                warningDiv.innerHTML = `
                    <h2>请使用小月 Web 服务器打开此页面</h2>
                    <p>当前使用 file:// 协议，功能将无法正常工作。</p>
                    <pre>python -m ui.web.server</pre>
                    <p>然后访问：<strong>http://localhost:8006/</strong></p>
                `;
                document.body.appendChild(warningDiv);
            });
        }
    </script>
</head>

<body>
    <!-- 背景容器 -->
    <div class="background-container" id="backgroundContainer">
        <div class="background-overlay"></div>
    </div>

    <!-- 主容器 -->
    <div class="container">

        <!-- 连接状态指示器 -->
        <div class="connection-status-top">
            <div class="status-indicator">
                <span class="status-dot status-disconnected"></span>
                <span id="connectionStatus">离线</span>
            </div>
        </div>

        <!-- 模型加载提示 -->
        <div class="model-container">
            <div class="model-loading" id="modelLoading">
                <div class="loading-char-float">
                    <div class="main-char">
                        <span>模</span><span>型</span><span>加</span><span>载</span><span>中</span><span>✨</span>
                    </div>
                    <div class="shadow-char">模型加载中✨</div>
                </div>
            </div>
        </div>

        <!-- Live2D Canvas 容器 -->
        <canvas id="live2d-stage"></canvas>

        <!-- 聊天消息流 -->
        <div class="chat-container">
            <div class="chat-stream" id="chatStream"></div>
            <div class="chat-ipt" id="chatIpt">
                <input type="text" id="messageInput" autocomplete="off" placeholder="输入消息，按Enter发送">
            </div>
        </div>

        <!-- 底部控制栏 -->
        <div class="control-bar">
            <button class="control-btn" id="settingsBtn" title="设置">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12A3.5 3.5 0 0 1 12 8.5A3.5 3.5 0 0 1 15.5 12A3.5 3.5 0 0 1 12 15.5M19.43 12.97C19.47 12.65 19.5 12.33 19.5 12C19.5 11.67 19.47 11.34 19.43 11L21.54 9.37C21.73 9.22 21.78 8.95 21.66 8.73L19.66 5.27C19.54 5.05 19.27 4.96 19.05 5.05L16.56 6.05C16.04 5.66 15.5 5.32 14.87 5.07L14.5 2.42C14.46 2.18 14.25 2 14 2H10C9.75 2 9.54 2.18 9.5 2.42L9.13 5.07C8.5 5.32 7.96 5.66 7.44 6.05L4.95 5.05C4.73 4.96 4.46 5.05 4.34 5.27L2.34 8.73C2.22 8.95 2.27 9.22 2.46 9.37L4.57 11C4.53 11.34 4.5 11.67 4.5 12C4.5 12.33 4.53 12.65 4.57 12.97L2.46 14.63C2.27 14.78 2.22 15.05 2.34 15.27L4.34 18.73C4.46 18.95 4.73 19.03 4.95 18.95L7.44 17.94C7.96 18.34 8.5 18.68 9.13 18.93L9.5 21.58C9.54 21.82 9.75 22 10 22H14C14.25 22 14.46 21.82 14.5 21.58L14.87 18.93C15.5 18.68 16.04 18.34 16.56 17.94L19.05 18.95C19.27 19.03 19.54 18.95 19.66 18.73L21.66 15.27C21.78 15.05 21.73 14.78 21.54 14.63L19.43 12.97Z" />
                </svg>
                <span class="btn-text">设置</span>
            </button>

            <button class="control-btn dial-btn" id="dialBtn" title="拨号">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6.62,10.79C8.06,13.62 10.38,15.94 13.21,17.38L15.41,15.18C15.69,14.9 16.08,14.82 16.43,14.93C17.55,15.3 18.75,15.5 20,15.5A1,1 0 0,1 21,16.5V20A1,1 0 0,1 20,21A17,17 0 0,1 3,4A1,1 0 0,1 4,3H7.5A1,1 0 0,1 8.5,4C8.5,5.25 8.7,6.45 9.07,7.57C9.18,7.92 9.1,8.31 8.82,8.59L6.62,10.79Z" />
                </svg>
                <span class="btn-text">拨号</span>
            </button>

            <button class="control-btn" id="recordBtn" title="开始录音" disabled>
                <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12,2A3,3 0 0,1 15,5V11A3,3 0 0,1 12,14A3,3 0 0,1 9,11V5A3,3 0 0,1 12,2M19,11C19,14.53 16.39,17.44 13,17.93V21H11V17.93C7.61,17.44 5,14.53 5,11H7A5,5 0 0,0 12,16A5,5 0 0,0 17,11H19Z" />
                </svg>
                <span class="btn-text">录音</span>
            </button>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal" id="settingsModal">
        <div class="modal-content settings-modal">
            <div class="modal-header">
                <h2>设置</h2>
                <button class="close-btn" id="closeSettingsBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="settings-tabs">
                    <button class="tab-btn active" data-tab="device">连接配置</button>
                    <button class="tab-btn" data-tab="other">数字人皮肤</button>
                </div>

                <div class="tab-content active" id="deviceTab">
                    <div class="connection-controls">
                        <div class="input-group">
                            <label for="serverUrl">小月服务器地址:</label>
                            <input type="text" id="serverUrl" value="http://localhost:8006"
                                placeholder="http://localhost:8006" />
                        </div>
                    </div>
                </div>

                <div class="tab-content" id="otherTab">
                    <div class="other-settings-panel">
                        <div class="control-panel">
                            <div class="config-row">
                                <div class="config-item">
                                    <label>选择模型:</label>
                                    <select id="live2dModelSelect" class="model-select">
                                        <option value="hiyori_pro_zh">Hiyori (春日)</option>
                                        <option value="natori_pro_zh">Natori (名取)</option>
                                        <option value="Mao">Mao (虹色猫)</option>
                                        <option value="Haru">Haru (春)</option>
                                        <option value="Rice">Rice (莱斯)</option>
                                        <option value="Murasame_Yukata">Murasame (浴衣少女)</option>
                                        <option value="Senko_Normals">Senko (仙狐小姐)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="config-row">
                                <div class="config-item">
                                    <label></label>
                                    <button class="background-btn" id="backgroundBtn" title="切换背景">
                                        <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                                            <path d="M12,18A6,6 0 0,1 6,12C6,11 6.25,10.03 6.7,9.2L5.24,7.74C4.46,8.97 4,10.43 4,12A8,8 0 0,0 12,20V23L16,19L12,15V18M12,4V1L8,5L12,9V6A6,6 0 0,1 18,12C18,13 17.75,13.97 17.3,14.8L18.76,16.26C19.54,15.03 20,13.57 20,12A8,8 0 0,0 12,4Z" />
                                        </svg>
                                        <span class="btn-text">切换背景</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Log 面板 -->
    <div id="logPanel" style="
        position: fixed; bottom: 0; right: 0; width: 360px; max-height: 40px;
        background: rgba(0,0,0,0.85); color: #ccc; font-size: 11px;
        font-family: monospace; z-index: 9999; border-radius: 8px 0 0 0;
        transition: max-height 0.3s; overflow: hidden;
    ">
        <div id="logHeader" style="
            display: flex; justify-content: space-between; align-items: center;
            padding: 4px 10px; cursor: pointer; user-select: none;
            border-bottom: 1px solid #333; background: rgba(0,0,0,0.95);
        ">
            <span>Log</span>
            <div>
                <button id="logCopyBtn" style="
                    background: #444; color: #fff; border: none; border-radius: 3px;
                    padding: 2px 8px; font-size: 10px; cursor: pointer; margin-right: 4px;
                " onclick="event.stopPropagation();
                    const t=document.getElementById('logContainer').innerText;
                    navigator.clipboard.writeText(t).then(()=>this.textContent='Copied!');
                    setTimeout(()=>this.textContent='Copy',1500);">Copy</button>
                <button id="logClearBtn" style="
                    background: #444; color: #fff; border: none; border-radius: 3px;
                    padding: 2px 8px; font-size: 10px; cursor: pointer;
                " onclick="event.stopPropagation();document.getElementById('logContainer').innerHTML='';">Clear</button>
            </div>
        </div>
        <div id="logContainer" style="
            overflow-y: auto; max-height: calc(50vh - 30px); padding: 4px 8px;
        "></div>
    </div>
    <script>
        document.getElementById('logHeader').addEventListener('click', function() {
            const panel = document.getElementById('logPanel');
            const expanded = panel.style.maxHeight !== '40px';
            panel.style.maxHeight = expanded ? '40px' : '50vh';
        });
    </script>

    <!-- 背景加载 -->
    <script src="js/ui/background-load.js?v=0403"></script>

    <!-- PIXI.js 2D渲染引擎 -->
    <script src="js/live2d/pixi.js?v=0403"></script>

    <!-- Live2D Cubism 4.0 SDK -->
    <script src="js/live2d/live2dcubismcore.min.js?v=0403"></script>
    <script src="js/live2d/cubism4.min.js?v=0403"></script>

    <!-- Live2D 管理器 -->
    <script src="js/live2d/live2d.js?v=0403"></script>

    <!-- 主应用入口 -->
    <script type="module" src="js/app.js?v=0403"></script>

    <!-- 全局错误处理 -->
    <script>
        window.addEventListener('error', function (event) {
            console.error('全局错误:', event.error);
        });
        window.addEventListener('unhandledrejection', function (event) {
            console.error('未处理的Promise拒绝:', event.reason);
        });
    </script>
</body>

</html>
