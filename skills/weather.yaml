schema_version: jarvis.skill.v1
name: get_weather
description: "Get scoped current, hourly, or daily weather for a city using Open-Meteo. Returns location, coverage, freshness, precipitation, wind, humidity/current details, and forecast limits."
version: 1
status: live
lifecycle:
  status: active
  reason: "Weather v2 uses Open-Meteo with explicit forecast type, coverage, location, timezone, freshness, and conservative claim policy."
  reviewed_at: "2026-05-10"
  phase3_action: "Monitor trace quality; add alerts/provider fallback later if needed."
  replacement: null
exposure:
  expose_to_llm: true
  allow_regex: true
  allow_frontend_direct: false
classification:
  layer: primitive
  primary: read_only
  risk_level: low
  has_side_effects: false
created_by: migrated

parameters:
  - name: city
    type: string
    description: "City name. Defaults to Victoria."
    required: false
    default: Victoria
  - name: forecast_type
    type: string
    description: "Weather scope: current, hourly, or daily. Use daily for future dates."
    required: false
    default: current
  - name: target_date
    type: string
    description: "Optional target date in YYYY-MM-DD format for hourly or daily forecasts."
    required: false
    default: ""
  - name: days
    type: integer
    description: "Optional forecast days to return when target_date is not set. Range is 1-16."
    required: false
    default: 7

annotations:
  read_only: true
  destructive: false
  idempotent: true

action:
  type: open_meteo_weather
  geocoding_url: "https://geocoding-api.open-meteo.com/v1/search"
  forecast_url: "https://api.open-meteo.com/v1/forecast"
  default_city: Victoria
  geocoding_language: auto
  geocoding_count: 10
  preferred_country_code: CA
  location_aliases:
    温哥华: 溫哥華
    维多利亚: 維多利亞
    东京: 東京
  current: "temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,rain,showers,snowfall,weather_code,cloud_cover,wind_speed_10m,wind_gusts_10m"
  hourly: "temperature_2m,apparent_temperature,precipitation_probability,precipitation,weather_code,wind_speed_10m"
  daily: "weather_code,temperature_2m_max,temperature_2m_min,apparent_temperature_max,apparent_temperature_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max"
  headers:
    Accept-Language: zh
  timeout_ms: 10000
  retry:
    max: 3
    delay_ms: 1000
    backoff: exponential

response:
  envelope: true
  status: success
  error_template: "天气查询失败，请稍后再试。"

security:
  allowed_domains:
    - geocoding-api.open-meteo.com
    - api.open-meteo.com
  requires_auth: false
