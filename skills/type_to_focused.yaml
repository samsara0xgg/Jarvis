name: type_to_focused
description: |
  Type Chinese (or any) text into the currently focused app — Claude Code,
  any text editor, any input field.

  Use ONLY when the user explicitly asks to "input / type / paste" into a
  window. Anchor phrases: "帮我输入", "帮我打字", "输入进去", "替我输入",
  "把这个打到", "type this into cc", "paste this into".

  Don't trigger on bare "记一下" / "保存" / "搜一下" — those are different
  intents (inbox / search). The focused-window paste is destructive: it
  enters the text wherever the user's cursor is, and the system clipboard
  is overwritten.

  Requires macOS Accessibility permission for the running python process
  on first use (System Settings → Privacy & Security → Accessibility).
version: 1
status: live
created_by: dogfood

parameters:
  - name: text
    type: string
    description: "The text to type into the currently focused window."
    required: true

annotations:
  read_only: false
  destructive: true
  idempotent: false

action:
  type: macos_paste
  text: "{{ text }}"

response:
  template: "已输入：{{ text[:30] }}{% if text|length > 30 %}...{% endif %}"
  error_template: "输入失败，请检查辅助功能权限并确认目标窗口已聚焦。"

security:
  requires_auth: false
