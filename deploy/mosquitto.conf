# Jarvis MQTT Broker 配置
# 安装到 /etc/mosquitto/conf.d/jarvis.conf

listener 1883
allow_anonymous false
password_file /etc/mosquitto/passwd

persistence true
persistence_location /var/lib/mosquitto/

log_dest syslog
log_type warning
log_type error

# 创建密码文件:
#   sudo mosquitto_passwd -c /etc/mosquitto/passwd jarvis
#   (输入密码，例如: jarvis123)
# 然后重启: sudo systemctl restart mosquitto
