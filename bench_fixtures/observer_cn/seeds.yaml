# Observer Bench — 20 fixture seeds (full benchmark set)
#
# 顺序: 前 5 (fx_001~fx_005) 覆盖 5 个不同 category, 用于 pilot 多样性.
# 后 15 是其他 category 的扩展.
#
# 分布 (per spec §5.1):
#   smart_home   3 (home/light/music/temp)
#   preference   4 (food/coffee/music/comm)
#   state_change 3 (job/move/fitness)
#   temporal     3 (reminder/appointment/deadline)
#   emotion      3 (tired/angry/anxious)
#   correction   2 (time/person)
#   multi_entity 1
#   completion   1
#
# Workflow:
#   1. uv run python scripts/observer_bench.py --observer-generate
#   2. 逐个 review fx_XXX.draft.json
#   3. mv fx_XXX.draft.json fx_XXX.json 表示批准

# ============================================================================
# PILOT SET (fx_001~fx_005): 5 个不同 category, 验证评测口径
# ============================================================================

- id: fx_001
  category: smart_home
  scene: "晚上让 Jarvis 调灯, 顺便抱怨工作"
  user_emotion_hint: tired
  tone_hint: "短句, 带抱怨, 像瘫在沙发上, 用'卧槽''草'之类口语"
  dialogue_length_hint: "3-4 turns"
  must_capture:
    - "偏好: 客厅灯偏暖色调 (🔴)"
    - "情绪: 用户疲惫不想动 (🟡)"
    - "完成: 灯调成功 (✅)"
  must_not_hallucinate:
    - "蓝光"
    - "冷白"
    - "卧室"

- id: fx_002
  category: preference
  scene: "咖啡偏好: 推荐 Revolver 的耶加雪菲拿铁"
  user_emotion_hint: happy
  tone_hint: "聊天式, 安利朋友的语气, 中英夹杂自然 (用 'flat white' 'order' 等)"
  dialogue_length_hint: "3-4 turns"
  must_capture:
    - "偏好: 用户最喜欢拿铁, 特别是 Revolver 的耶加雪菲 (🔴, 具体品牌+豆子)"
  must_not_hallucinate:
    - "美式"
    - "Standard Brew"
    - "不喝咖啡"

- id: fx_003
  category: state_change
  scene: "聊起最近从 Acme 跳槽到 Stripe"
  user_emotion_hint: neutral
  tone_hint: "随口一提, 中间夹杂对前公司的吐槽, 中英夹杂"
  dialogue_length_hint: "3-4 turns"
  must_capture:
    - "状态变更: 用户从 Acme 换到 Stripe (🔴, 替换关系, 不再在 Acme)"
  must_not_hallucinate:
    - "在 Acme 工作"
    - "同时在两家"
    - "被解雇"
    - "兼职"

- id: fx_004
  category: temporal
  scene: "设提醒: 明早 7 点出门跑 Stanley Park"
  user_emotion_hint: neutral
  tone_hint: "事务性指令, 简短"
  dialogue_length_hint: "2-3 turns"
  must_capture:
    - "提醒: 明早 7 点出门跑 Stanley Park (🔴, 具体时间+地点)"
    - "完成: Jarvis 已设提醒 (✅)"
  must_not_hallucinate:
    - "今天"
    - "下午"
    - "Kitsilano"

- id: fx_005
  category: emotion
  scene: "客户/合作方扯皮, 跟 Jarvis 倒苦水"
  user_emotion_hint: angry
  tone_hint: "情绪化, 长短句混合, 反复念叨同一件事, 可能爆粗"
  dialogue_length_hint: "3-4 turns"
  must_capture:
    - "情绪: 用户对合作方/客户感到愤怒不满 (🟡)"
    - "实体: 合作方/客户 (🟡, 工作场合关系)"
  must_not_hallucinate:
    - "辞职"
    - "想杀人"
    - "心理疾病"
    - "上司"

# ============================================================================
# FULL SET (fx_006~fx_020): 余下 15 条扩到 20 完整覆盖
# ============================================================================

